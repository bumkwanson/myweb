<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>모바일 반응형 웹 - 시(詩) 예제</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
        <style>
            body {
            margin: 0;
            padding: 0;
            font-family: 'pretendard', sans-serif;
            background: #f0ece4;
            display: flex;
            }
            .poem-container {
            max-width: 500px;
            width: 80%;
            margin: 50px auto;
            background: #fff8f0;
            border-radius: 5px;
            padding: 48px 40px;
            box-shadow: 4px 4px 0px #c9b8a8;
            border: 1.5px solid #c9b8a8;
            color: #3b2f2f;
            text-align: left;
            }
            .poem-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            color: #3b2f2f;
            letter-spacing: 0.12em;
            border-bottom: 2px solid #c9b8a8;
            padding-bottom: 16px;
            }
            .poem-body p {
            line-height: 2.2;
            font-size: 1.05rem;
            color: #4a3b3b;
            margin: 0;
            }
            .poem-author {
            margin-top: 32px;
            font-size: 0.9rem;
            color: #8a7060;
            text-align: right;
            }
            @media (max-width: 480px) {
            .poem-container {
                padding: 32px 24px;
            }
            .poem-title {
                font-size: 1.2rem;
            }
            .poem-body p {
                font-size: 0.98rem;
            }
            }
        </style>
    </head>
    <body>
    <div class="poem-container">
        <div class="poem-title">진달래꽃</div>
        <div class="poem-body">
        <p>
            나 보기가 역겨워<br>
            가실 때에는<br>
            말없이 고이 보내드리오리다.<br>
            <br>
            영변(寧邊)에 약산(藥山)<br>
            진달래꽃<br>
            아름 따다 가실 길에 뿌리오리다.<br>
            <br>
            가시는 걸음 걸음<br>
            놓인 그 꽃을<br>
            사뿐히 즈려 밟고 가시옵소서.<br>
            <br>
            나 보기가 역겨워<br>
            가실 때에는<br>
            죽어도 아니 눈물 흘리오리다.<br>
        </p>
        </div>
        <div class="poem-author">- 김소월</div>
    </div>
    </body>
</html>
