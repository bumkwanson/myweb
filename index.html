<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>모바일 반응형 웹 - 시(詩) 예제</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
        <style>
            body {
            margin: 0;
            padding: 0;
            font-family: 'pretendard', sans-serif;
            background: #6b7783;
            }
            .poem-container {
            max-width: 700px;
            margin: 40px auto;
            background: linear-gradient(135deg, #7f9258 0%, #6774b8 100%);
            border-radius: 25px;
            padding: 32px 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            color: #343a40;
            text-align: center;
            transition: background 0.3s;
            }
            .poem-title {
            font-size: 1.7rem;
            font-weight: bold;
            margin-bottom: 24px;
            color: #a3a5bf;
            letter-spacing: 0.05em;
            }
            .poem-author {
            margin-top: 24px;
            font-size: 1rem;
            color: #373737;
            font-style: italic;
            }
            @media (max-width: 480px) {
            .poem-container {
                padding: 20px 8px;
                font-size: 1rem;
            }
            .poem-title {
                font-size: 1.3rem;
            }
            }
        </style>
    </head>
    <body>
    <div class="poem-container">
        <div class="poem-title">진달래꽃</div>
        <div>
        <p>
            나 보기가 역겨워<br>
            가실 때에는<br>
            말없이 고이 보내드리오리다.<br>
            <br>
            영변(寧邊)에 약산(藥山)<br>
            진달래꽃<br>
            아름 따다 가실 길에 뿌리오리다.<br>
            <br>
            가시는 걸음 걸음<br>
            놓인 그 꽃을<br>
            사뿐히 즈려 밟고 가시옵소서.<br>
            <br>
            나 보기가 역겨워<br>
            가실 때에는<br>
            죽어도 아니 눈물 흘리오리다.<br>
        </p>
        </div>
        <div class="poem-author">- 김소월</div>
    </div>
    </body>
</html>
